<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Status</title>
</head>
<body style="font-family: Arial, sans-serif; text-align:center; margin-top:60px;">

<h1>Equipment Inspection Status</h1>

<h2 id="equipment">Loading...</h2>

<p><strong>Last Inspection:</strong> <span id="last">-</span></p>

<p><strong>Next Inspection:</strong> <span id="next">-</span></p>

<p><strong>Condition:</strong> <span id="condition">-</span></p>

    <script>
const params = new URLSearchParams(window.location.search);
const equipmentId = params.get("id");

async function loadData() {
    if (!equipmentId) {
        document.getElementById("equipment").textContent = "No Equipment Selected";
        return;
    }

    document.getElementById("equipment").textContent = equipmentId;

    const response = await fetch("data.json");
    const data = await response.json();

    if (data[equipmentId]) {
        document.getElementById("last").textContent = data[equipmentId].lastInspection;
        document.getElementById("next").textContent = data[equipmentId].nextInspection;
        document.getElementById("condition").textContent = data[equipmentId].condition;
    } else {
        document.getElementById("last").textContent = "Not Found";
        document.getElementById("next").textContent = "-";
        document.getElementById("condition").textContent = "-";
    }
}

loadData();
</script>
</body>
</html>
